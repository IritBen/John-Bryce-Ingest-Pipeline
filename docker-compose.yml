services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: meridian
      POSTGRES_PASSWORD: meridian
      POSTGRES_DB: meridian_trips
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      #use this volume
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian -d meridian_trips"]
      #I check that the db is ready. if the container is not up it's not possible to do the health check
      interval: 2s
      timeout: 3s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_container
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin/data
    depends_on:
      - db

volumes:
  pgdata:
  pgadmin_data:
  #available for all containers
