services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: meridian
      POSTGRES_PASSWORD: meridian
      POSTGRES_DB: meridian_trips
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian -d meridian_trips"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  - pgdata: